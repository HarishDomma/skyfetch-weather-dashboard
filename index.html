<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyFetch - Weather Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🌤️ SkyFetch</h1>
        <p class="tagline">Your Personal Weather Dashboard</p>

        <!-- Search -->
        <div class="search-section">
            <input
                type="text"
                id="city-input"
                placeholder="Enter city name..."
                autocomplete="off"
            />
            <button id="search-btn">🔍 Search</button>
        </div>

        <!-- Recent Searches -->
        <div id="recent-searches-section" class="recent-searches-section">
            <div class="recent-searches-header">
                <h4>Recent Searches</h4>
                <button id="clear-history-btn" class="clear-history-btn">✕ Clear</button>
            </div>
            <div id="recent-searches-container"></div>
        </div>

        <!-- Weather Output -->
        <div id="weather-display"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
